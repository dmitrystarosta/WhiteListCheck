name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build debug APK
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk NetStatus.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NetStatus
          path: NetStatus.apk
